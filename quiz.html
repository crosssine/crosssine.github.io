<style>

{q:"2. ต่อมใต้สมองส่วนหน้าสร้างฮอร์โมน 2 ชนิด ทำหน้าที่เกี่ยวกับเนื้อเยื่อร่างกายโดยทั่วไป คือ",c:["ACTH, FSH","ACTH, Somatotrophin","Prolactin, FSH","Prolactin, Somatotrophin"],a:3},
{q:"3. ฮอร์โมนกับผลที่เกิดคู่ใดไม่ถูกต้อง",c:["ออกซิโทซิน - กระตุ้นมดลูกให้บีบตัวในช่วงคลอดลูก","ไทรอกซิน - กระตุ้นกระบวนการเมแทบอลิซึม","อินซูลิน – กระตุ้นการสลายตัวของไกลโคเจนในตับ","ACTH - กระตุ้นการหลั่งกลูโคคอร์ติซอยด์ของอะดรีนัลคอร์เทกซ์"],a:2},
{q:"4. ข้อความใดที่เกี่ยวข้องกับฮอร์โมนที่ไม่ถูกต้อง",c:["ฮอร์โมนเป็นสารเคมีที่ถูกส่งไปยังเซลล์เป้าหมายโดยผ่านระบบหมุนเวียนเลือด","ฮอร์โมนที่เป็นสารประกอบประเภทเดียวกัน ปกติแล้วจะทำหน้าที่เหมือนๆกัน","ฮอร์โมนควบคุมสมดุลด้วยการใช้การควบคุมในทางตรงกันข้าม","ฮอร์โมนหลั่งออกมาจากเซลล์พิเศษ ซึ่งปกติอยู่ในต่อมไร้ท่อ"],a:1},
{q:"5. อวัยวะใดไม่สร้างฮอร์โมน",c:["ส่วนของหัวใจ","ต่อมใต้สมองหน้า","ต่อมใต้สมองส่วนหลัง","ต่อมไพเนียล"],a:2},
{q:"6. อวัยวะใดที่สามารถผลิตได้ทั้งน้ำย่อยและฮอร์โมน",c:["ตับ","ตับอ่อน","ลำไส้เล็ก","ลำไส้ใหญ่"],a:1},
{q:"7. ต่อมภายในร่างกายที่ทำหน้าที่ได้ทั้งต่อมไร้ท่อและต่อมมีท่อ",c:["ต่อมอะดรีนัลและตับ","ตับอ่อนและอวัยวะสืบพันธุ์","ตับและตับอ่อน","ตับอ่อนและต่อมน้ำลาย"],a:1},
{q:"8. Acromegaly เป็นโรคที่เกิดจากการมีฮอร์โมนใดมาก เมื่อตอนเป็นผู้ใหญ่",c:["Growth hormone จาก Posterior pituitary","Growth hormone จาก Anterior pituitary","Gonadotrophins จาก Posterior pituitary","Thyroxin จาก Thyroid"],a:1},

{q:"16. ฮอร์โมนที่มีความสัมพันธ์กันน้อยที่สุด ได้แก่",c:["LH และ Testosterone","Calcitonin และ Parathyroid hormone","Oxytocin และ Mineralocorticoids","Insulin และ Glucocorticoids"],a:2},
{q:"17. คนที่ถูกอดอาหารแล้วจัดให้รับประทานหวานจัดตลอดวันทั้ง 3 มื้อ หากร่างกายปกติ ในการตรวจสอบน้ำตาลจะพบปริมาณน้ำตาลสูงที่ใดบ้าง",c:["ในปัสสาวะ","ในปัสสาวะและเลือด","ในเลือด","ในเลือดเฉพาะหลังอาหารเล็กน้อย"],a:3},
{q:"18. ชื่อที่เกี่ยวข้องกันมากที่สุด ได้แก่",c:["ความเครียด และ ACTH","ถุงน้ำดีและการย่อยโปรตีน","ความตกใจและการตกไข่","ต่อมไพเนียลและต่อมพาราไทรอยด์"],a:0},

{q:"20. ฮอร์โมนที่สร้างมาจากเซลล์ประสาท ได้แก่",c:["Oxytocin และ Acetylcholine","Adrenalin และ Noradrenalin","Vasopressin และ Adrenalin","Noradrenalin และ Oxytocin"],a:3},
{q:"21. ฮอร์โมนมีบทบาทสำคัญในการควบคุมเมแทบอลิซึมของคาร์โบไฮเดรต ได้แก่",c:["Cortisol Insulin Melatonin","Glucagon Calcitonin Adrenaline","Adrenaline Cortisol Glucagon","Insulin Adrenaline Oxytocin"],a:2},
{q:"22. ฮอร์โมนที่ไม่ได้หลั่งมาจากต่อมใต้สมองส่วนหน้าคือ",c:["ACTH","STH (GH)","TSH","ADH"],a:3},

{q:"24. หากร่างกายไม่ได้รับไอโอดีนติดต่อกันเป็นเวลานานๆ โรคที่น่าจะเป็นได้ง่ายที่สุดควรจะเป็น",c:["คอพอกและตาโปน","Myxedema","คอพอก และ Myxedema","Grave's disease"],a:2},
{q:"25. เนื้อเยื่อของคอร์ปัสลูเทียมส่วนใหญ่จะสร้างมาจาก",c:["Primordial follicle","Theca externa","Interstitial tissue","Granulosa cells"],a:3},

let current = 0, score = 0, answered = false;
const answers = [];

function shuffle(arr) {
  // returns array of indices shuffled, and mapping
  return arr.map((v,i)=>i).sort(()=>Math.random()-0.5);
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qCount').textContent = `ข้อที่ ${current+1} / ${questions.length}   คะแนน: ${score}`;
  document.getElementById('progressFill').style.width = `${(current/questions.length)*100}%`;
  document.getElementById('questionText').textContent = q.q;
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').disabled = true;

  q.c.forEach((choiceText, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = choiceText;
    btn.onclick = () => selectAnswer(idx);
    choicesDiv.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const buttons = document.querySelectorAll('.choice');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.a) btn.classList.add('correct');
    else if (i === idx && idx !== q.a) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  const isCorrect = idx === q.a;
  if (isCorrect) {
    score++;
    fb.textContent = '✅ ถูกต้อง!';
    fb.className = 'feedback show correct-fb';
  } else {
    fb.textContent = `❌ ยังไม่ถูก คำตอบที่ถูกคือ: ${q.c[q.a]}`;
    fb.className = 'feedback show wrong-fb';
  }
  answers.push({q: q.q, correct: isCorrect, correctAnswer: q.c[q.a], picked: q.c[idx]});
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('qCount').textContent = `ข้อที่ ${current+1} / ${questions.length}   คะแนน: ${score}`;
}

document.getElementById('nextBtn').onclick = () => {
  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('scoreText').textContent = `${score} / ${questions.length}`;
  const pct = Math.round((score/questions.length)*100);
  let msg = '';
  if (pct >= 80) msg = 'ยอดเยี่ยมมาก! เข้าใจระบบต่อมไร้ท่อดีมาก 🎉';
  else if (pct >= 60) msg = 'ทำได้ดี! ทบทวนอีกนิดจะเป๊ะเลย 👍';
  else msg = 'ลองทบทวนเนื้อหาแล้วมาทำใหม่นะ 💪';
  document.getElementById('scoreMsg').textContent = `${pct}% — ${msg}`;

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '<div style="font-weight:700;margin-bottom:8px;">สรุปคำตอบที่ผิด:</div>';
  const wrongOnes = answers.filter(a => !a.correct);
  if (wrongOnes.length === 0) {
    reviewList.innerHTML += '<div class="review-item ok">ไม่มีข้อที่ตอบผิดเลย เก่งมาก!</div>';
  } else {
    wrongOnes.forEach(a => {
      const div = document.createElement('div');
      div.className = 'review-item bad';
      div.innerHTML = `<div>${a.q}</div><div style="margin-top:4px;">คุณตอบ: ${a.picked} | ที่ถูกคือ: <b>${a.correctAnswer}</b></div>`;
      reviewList.appendChild(div);
    });
  }
}

document.getElementById('restartBtn').onclick = () => {
  current = 0; score = 0; answered = false;
  answers.length = 0;
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  loadQuestion();
};

loadQuestion();
</script>
